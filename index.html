<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sergey's personal website">
    <title>Sergey Boykov — personal website</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/library.css">

    <link rel="icon" type="image/jpg" href="favicon.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/styles/vs2015.min.css">
</head>

<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-info">
                <div class="profile-avatar">
                    <img src="favicon.jpg" alt="Sergey" class="avatar-img">
                </div>
                <h2 class="profile-name">Sergey Boykov</h2>
                <p class="profile-title" data-i18n="profile.subtitle">Code that solves. Photos that tell. Motion that balances.</p>
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#about" class="nav-link active" data-section="about">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span data-i18n="nav.about">About me</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#tech" class="nav-link" data-section="tech">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span data-i18n="nav.tech">App Development</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#sport" class="nav-link" data-section="sport">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                    <span data-i18n="nav.sport">Sport</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#photography" class="nav-link" data-section="photography">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    <span data-i18n="nav.photography">Photography</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#donate" class="nav-link" data-section="donate">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    <span data-i18n="nav.donate">Support</span>
                </a>
            </li>

            <li class="nav-divider"></li>

            <li class="nav-item nav-item-library" id="navLibrary">
                <a href="#library" class="nav-link" data-section="library">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span data-i18n="nav.library">Library</span>
                    <span class="library-toggle-arrow">▶</span>
                </a>
                <div class="library-nav-tree" id="libraryNavTree"></div>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="time-display">
                <div id="moscowTime" data-i18n="clock.display"><span data-i18n="clock.today">Today:</span> 01.01.2024<br><span data-i18n="clock.now">Now:</span> 00:00:00 MSK</div>
            </div>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en" data-i18n="lang.en">EN</button>
            <button class="lang-btn" data-lang="ru" data-i18n="lang.ru">RU</button>
        </div>
    </nav>

    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <main class="main-content">
        <section id="about" class="content-section active"></section>
        <section id="tech" class="content-section"></section>
        <section id="sport" class="content-section"></section>
        <section id="photography" class="content-section"></section>
        <section id="donate" class="content-section"></section>
        <section id="library" class="content-section"></section>
    </main>

    <div class="overlay" id="overlay"></div>

    <div id="certificateModal" class="certificate-modal">
        <span class="certificate-modal-close" id="certificateModalClose">&times;</span>
        <img class="certificate-modal-content" id="certificateModalImg" alt="">
    </div>

    <div id="projectModal" class="project-modal">
        <span class="project-modal-close" id="projectModalClose">&times;</span>
        <div class="project-modal-content">
            <h2 class="project-modal-title" id="projectModalTitle"></h2>
            <div class="project-modal-description" id="projectModalDescription"></div>
            <div class="project-modal-screenshots" id="projectModalScreenshots"></div>
            <div class="project-modal-action" id="projectModalAction"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.0/languages/dart.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
